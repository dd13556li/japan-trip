    { category: "🎫 JR Pass (3 大 2 小)", jpyPerAdult: 15000, jpyPerKid: 7500, note: "北九州 5 日券 (D3-D7)" },
    { category: "🚌 雜項交通 (含機場長途巴士)", totalJpy: 50000, note: "含機場往返、Suica、零星兩台計程車接駁" },

const TabButton = ({ active, onClick, icon, label }) => (
  <button

    className={`flex items-center gap-2 px-4 py-3 font-medium text-sm sm:text-base whitespace-nowrap transition-colors border-b-2 ${
      active
        ? 'border-blue-600 text-blue-600 dark:border-blue-400 dark:text-blue-400'

    }`}
  >
    {icon}
    {label}
  </button>
);

const RouteVisualizer = ({ locations, mapInfo }) => (
  <div className="bg-blue-50/50 dark:bg-slate-800/80 rounded-xl p-4 mb-4 border border-blue-100 dark:border-slate-700">
    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2">
      <div className="text-xs font-bold text-blue-800 dark:text-blue-400 flex items-center gap-1 uppercase tracking-wider">
        <MapPin className="w-3 h-3" /> 當日細部路線
      </div>
      {mapInfo && (
        <div className="flex gap-3 text-xs font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-900 px-3 py-1.5 rounded-lg border border-blue-100 dark:border-slate-700 shadow-sm">
          <span className="flex items-center gap-1"><Route className="w-3.5 h-3.5 text-blue-500" /> {mapInfo.distance}</span>
          <span className="flex items-center gap-1"><Clock className="w-3.5 h-3.5 text-orange-500" /> {mapInfo.duration}</span>
        </div>

    <div className="flex flex-wrap items-center gap-y-6 gap-x-2">

        <React.Fragment key={idx}>

              <span className="w-2 h-2 rounded-full bg-blue-500 dark:bg-blue-400 block"></span>
              {step.name}
            </span>
          </div>
          {step.time && (
            <div className="flex flex-col items-center justify-center px-1 transform translate-y-[-2px]">
              <span className="text-[10px] font-medium text-blue-600 dark:text-blue-300 bg-blue-100/50 dark:bg-slate-800 px-1.5 rounded-sm mb-0.5 whitespace-nowrap">{step.time}</span>
              <ArrowRight className="w-4 h-4 text-blue-300 dark:text-slate-500" />
            </div>

        </React.Fragment>
      ))}

);

const DayCard = ({ dayData }) => {
  const [expanded, setExpanded] = useState(false);
  const [selectedPlan, setSelectedPlan] = useState(0);

  useEffect(() => { setSelectedPlan(0); }, [dayData]);

  const activePlan = dayData.plans ? dayData.plans[selectedPlan] : null;
  const activities = activePlan ? activePlan.activities : dayData.activities;
  const routeMap = activePlan ? activePlan.routeMap : dayData.routeMap;
  const mapInfo = activePlan ? activePlan.mapInfo : dayData.mapInfo;
  const tips = activePlan ? activePlan.tips : dayData.tips;

  const handlePlanClick = (e, idx) => { e.stopPropagation(); setSelectedPlan(idx); };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-100 dark:border-slate-700 overflow-hidden mb-4 transition-all">
      <div
        className="p-4 sm:p-5 flex flex-col sm:flex-row sm:justify-between sm:items-center cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-700/50 gap-4"
        onClick={() => setExpanded(!expanded)}
      >
        <div className="flex gap-4 items-center flex-1">
          <div className="bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 font-bold rounded-lg w-12 h-12 flex items-center justify-center">D{dayData.day}</div>
          <div>
            <h3 className="font-bold text-lg text-gray-800 dark:text-slate-100">{dayData.title}</h3>
            <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm mt-1">
              <span className="flex items-center gap-1 text-gray-500 dark:text-slate-400"><MapPin className="w-4 h-4" />{dayData.base}</span>
              <span className="flex items-center gap-1 text-blue-600 dark:text-blue-400 font-medium bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded"><Car className="w-4 h-4" />{dayData.transport}</span>
            </div>
          </div>
        </div>
        <div className="flex items-center justify-between sm:justify-end gap-3 w-full sm:w-auto border-t dark:border-slate-700 sm:border-0 pt-2 sm:pt-0">
          <span className="text-xs font-semibold text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20 px-2 py-1 rounded border border-orange-100 dark:border-orange-800/50">{dayData.ticket}</span>
          {expanded ? <ChevronUp className="text-gray-400" /> : <ChevronDown className="text-gray-400" />}
        </div>
      </div>
      {expanded && (
        <div className="px-5 pb-5 pt-3 border-t border-gray-50 dark:border-slate-700 bg-gray-50/30 dark:bg-slate-800/80">
          {dayData.plans && (
            <div className="flex gap-2 mb-4 p-1 bg-gray-100 dark:bg-slate-700 rounded-xl">
              {dayData.plans.map((plan, idx) => (
                <button
                  key={idx}
                  onClick={(e) => handlePlanClick(e, idx)}
                  className={`flex-1 text-sm font-semibold px-3 py-2 rounded-lg transition-all ${selectedPlan === idx ? 'bg-white dark:bg-slate-600 shadow text-blue-600 dark:text-blue-300' : 'text-gray-500 dark:text-slate-400 hover:text-blue-500'}`}
                >
                  {plan.label}
                </button>
              ))}
            </div>
          )}
          <RouteVisualizer locations={routeMap} mapInfo={mapInfo} />
          <div className="space-y-4">
            {activities.map((act, idx) => (
              <div key={idx} className="flex gap-3 text-sm sm:text-base">
                <span className="font-bold text-blue-600 dark:text-blue-400 w-16">{act.time}</span>
                <span className="text-gray-700 dark:text-slate-300 flex-1">{act.desc}</span>
              </div>
            ))}
          </div>
          {tips && (
            <div className="mt-4 p-3 bg-orange-50 dark:bg-orange-900/20 rounded-lg flex gap-2 items-start border border-orange-100 dark:border-orange-800/30">
              <Info className="w-5 h-5 text-orange-500 dark:text-orange-400 flex-shrink-0 mt-0.5" />
              <p className="text-sm text-orange-800 dark:text-orange-200">{tips}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const InteractiveTrajectoryMap = () => {
  const [selectedDayIndex, setSelectedDayIndex] = useState(0);
  const currentDayData = itinerary[selectedDayIndex];
  const pathNodes = currentDayData.mapPath || [];

  const generatePathD = () => {
    if (pathNodes.length < 2) return "";
    let d = "";
    pathNodes.forEach((nodeId, index) => {
      const node = mapNodes[nodeId];
      if (index === 0) d += `M ${node.x} ${node.y} `;
      else d += `L ${node.x} ${node.y} `;
    });
    return d;
  };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden flex flex-col md:flex-row">
      <div className="w-full md:w-3/5 bg-[#eaf4fc] dark:bg-slate-900 p-2 sm:p-6 relative aspect-square md:aspect-auto md:min-h-[500px] border-b md:border-b-0 md:border-r border-gray-200 dark:border-slate-700 flex items-center justify-center overflow-hidden">
        <div className="absolute top-4 left-4 bg-white/90 dark:bg-slate-800/90 p-2 rounded-lg text-sm font-bold shadow-sm z-20">
          <div className="flex items-center gap-2 text-blue-600">Day {currentDayData.day} 軌跡</div>
        </div>
        <div className="relative w-full max-w-[450px] aspect-[4/5] transform scale-110 sm:scale-100">
          <svg className="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            <path d="M38,10 L45,10 L52,15 L62,12 L75,18 L82,32 L85,45 L82,55 L75,65 L78,75 L70,88 L60,95 L50,92 L45,80 L35,85 L25,82 L15,75 L20,60 L25,55 L15,45 L18,35 L28,28 L32,18 Z"
              fill="currentColor" className="text-[#d8e8d2] dark:text-[#2c3e50]" strokeWidth="0.5"/>
            <path d="M45,28 L75,32 M35,45 L65,48 M40,65 L70,60" stroke="rgba(0,0,0,0.05)" strokeWidth="0.3" strokeDasharray="1,1" fill="none" className="dark:stroke-slate-600"/>
          </svg>
          <svg className="absolute inset-0 w-full h-full overflow-visible z-10" viewBox="0 0 100 100">
            {pathNodes.length > 1 && (
              <path key={selectedDayIndex} d={generatePathD()} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="map-line-anim drop-shadow-md" />
            )}
          </svg>
          {Object.values(mapNodes).map((node) => {
            const isActive = pathNodes.includes(node.id);
            return (
              <div key={node.id} className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-20" style={{ left: `${node.x}%`, top: `${node.y}%` }}>
                <div className={`rounded-full border-2 transition-all ${isActive ? 'w-4 h-4 bg-blue-600 border-white scale-125' : 'w-3 h-3 bg-gray-400 opacity-60'}`}>
                  {pathNodes.length === 1 && pathNodes[0] === node.id && <span className="absolute inset-0 rounded-full bg-blue-400 opacity-80 animate-ping"></span>}
                </div>
                <div className={`mt-1 px-1 rounded text-[10px] font-bold ${isActive ? 'bg-gray-800 text-white' : 'text-gray-500'}`}>{node.name}</div>
              </div>
            )
          })}
        </div>
      </div>
      <div className="w-full md:w-2/5 p-4 overflow-y-auto max-h-[500px] custom-scrollbar">
        {itinerary.map((day, idx) => (
          <button key={idx} onClick={() => setSelectedDayIndex(idx)} className={`w-full text-left p-3 rounded-xl border mb-2 transition-all ${selectedDayIndex === idx ? 'bg-blue-50 border-blue-300 dark:bg-blue-900/30' : 'bg-white dark:bg-slate-800 border-gray-100 dark:border-slate-700'}`}>
            <span className="font-bold text-sm">Day {day.day}: {day.base}</span>
            <p className="text-xs text-gray-500 truncate">{day.title}</p>
          </button>
        ))}
      </div>
    </div>
  );
};

function App() {
  const [activeTab, setActiveTab] = useState('map');
  const [darkMode, setDarkMode] = useState(false);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
  }, [darkMode]);

  const totalAdults = budgetData.pax.adults;
  const totalKids = budgetData.pax.kids;
  const totalJpy = budgetData.items.reduce((sum, item) => sum + (item.totalJpy || ((item.jpyPerAdult * totalAdults) + (item.jpyPerKid * totalKids))), 0);
  const totalTwd = Math.round(totalJpy * budgetData.currencyRate);

  return (
    <div className={`min-h-screen font-sans ${darkMode ? 'dark bg-slate-900 text-slate-200' : 'bg-gray-50 text-slate-800'}`}>
      <header className="bg-gradient-to-r from-blue-700 to-teal-600 dark:from-slate-800 dark:to-slate-900 text-white p-6 sm:p-10 relative overflow-hidden">
        <Plane className="absolute -right-4 top-4 w-32 h-32 text-white opacity-20 transform rotate-[-45deg] pointer-events-none" />
        <button onClick={() => setDarkMode(!darkMode)} className="absolute top-6 right-6 p-2 bg-white/10 hover:bg-white/20 rounded-full z-10">
          <IconComp name={darkMode ? 'Sun' : 'Moon'} />
        </button>
        <div className="max-w-5xl mx-auto mt-4 sm:mt-0 relative z-10">
          <div className="inline-block px-3 py-1 bg-white/20 rounded-full text-xs font-semibold mb-4 border border-white/30">KUMAMOTO AIRPORT ARRIVAL</div>
          <h1 className="text-3xl font-black mb-3">{overview.title}</h1>
          <p className="text-blue-100 font-medium mb-6">{overview.subtitle}</p>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm mt-6 bg-white/10 p-4 rounded-xl">
            <div className="flex items-center gap-2"><Calendar size={18} /><span>{overview.dates}</span></div>
            <div className="flex items-center gap-2"><Users size={18} /><span>5 人 (老中青)</span></div>
            <div className="flex items-center gap-2"><Home size={18} /><span>3 個重點據點</span></div>
            <div className="flex items-center gap-2"><Plane size={18} /><span>熊本機場進出</span></div>
          </div>
        </div>
      </header>

      <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-20 shadow-sm overflow-x-auto">
        <div className="max-w-5xl mx-auto px-4 flex">
          <TabButton active={activeTab === 'map'} onClick={() => setActiveTab('map')} icon={<Navigation size={18} />} label="🗺️ 軌跡地圖" />
          <TabButton active={activeTab === 'itinerary'} onClick={() => setActiveTab('itinerary')} icon={<MapIcon size={18} />} label="每日行程" />
          <TabButton active={activeTab === 'bases'} onClick={() => setActiveTab('bases')} icon={<Home size={18} />} label="住宿清單" />
          <TabButton active={activeTab === 'tickets'} onClick={() => setActiveTab('tickets')} icon={<Ticket size={18} />} label="必備票券" />
          <TabButton active={activeTab === 'budget'} onClick={() => setActiveTab('budget')} icon={<Wallet size={18} />} label="預算評估" />
        </div>
      </div>

      <main className="max-w-5xl mx-auto p-4 sm:p-6 pb-20">
        {activeTab === 'map' && <div className="animate-in fade-in duration-500"><InteractiveTrajectoryMap /></div>}
        {activeTab === 'itinerary' && <div className="animate-in fade-in duration-500 space-y-2">{itinerary.map(day => <DayCard key={day.day} dayData={day} />)}</div>}
        {activeTab === 'bases' && <div className="animate-in fade-in duration-500 space-y-6">
          {bases.map((base) => (
            <div key={base.id} className="bg-white dark:bg-slate-800 rounded-xl shadow-md border-t-4 border-blue-500 p-6">
              <h3 className="text-xl font-black mb-2">{base.name} <span className="text-sm font-normal text-blue-500 ml-2">{base.nights}</span></h3>
              <p className="text-sm text-gray-500 mb-4">{base.description}</p>
              <div className="grid sm:grid-cols-2 gap-4">
                <div><h4 className="text-xs font-black uppercase text-slate-400 mb-2">推薦飯店</h4>{base.hotels.map((h, i) => <div key={i} className="mb-2 p-3 bg-slate-50 dark:bg-slate-900/50 rounded text-sm font-bold">{h.name}<p className="text-xs font-normal text-gray-500 mt-1">{h.desc}</p></div>)}</div>
                <div><h4 className="text-xs font-black uppercase text-slate-400 mb-2">經濟民宿</h4>{base.guesthouses.map((gh, i) => <div key={i} className="mb-2 p-3 bg-teal-50/50 dark:bg-teal-900/10 rounded text-sm font-bold text-teal-800 dark:text-teal-400">{gh.name}<p className="text-xs font-normal text-teal-700/70 mt-1">{gh.desc}</p></div>)}</div>
              </div>
            </div>
          ))}
        </div>}
        {activeTab === 'tickets' && <div className="animate-in fade-in duration-500 grid sm:grid-cols-2 gap-4">
          {ticketsInfo.map((ticket, idx) => (
            <div key={idx} className="bg-white dark:bg-slate-800 p-5 rounded-xl shadow border dark:border-slate-700 flex gap-4">
              <div className="text-blue-500">{ticket.icon}</div>
              <div><h3 className="font-bold mb-1">{ticket.title}</h3><p className="text-xs text-gray-500 mb-2">{ticket.desc}</p><span className="text-[10px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 px-2 py-1 rounded">{ticket.users}</span></div>
            </div>
          ))}
        </div>}
        {activeTab === 'budget' && <div className="animate-in fade-in duration-500">
          <div className="bg-blue-600 text-white p-8 rounded-3xl mb-8 shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4">
            <div><p className="opacity-70 mb-1">總預算預估 (5 人)</p><div className="text-4xl font-black">NT$ {totalTwd.toLocaleString()}</div></div>
            <div className="text-right"><p className="opacity-70 text-sm">約合日圓</p><div className="text-xl font-bold">¥ {totalJpy.toLocaleString()}</div></div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl shadow overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-slate-50 dark:bg-slate-900/50"><tr><th className="p-4">項目</th><th className="p-4 text-right">日圓</th><th className="p-4 text-right border-l dark:border-slate-700">台幣</th></tr></thead>
              <tbody className="divide-y dark:divide-slate-700">
                {budgetData.items.map((item, idx) => {
                  const jpy = item.totalJpy || ((item.jpyPerAdult * totalAdults) + (item.jpyPerKid * totalKids));
                  return (<tr key={idx}><td className="p-4 font-bold">{item.category}</td><td className="p-4 text-right font-mono">¥{jpy.toLocaleString()}</td><td className="p-4 text-right font-black text-blue-600">NT${Math.round(jpy * budgetData.currencyRate).toLocaleString()}</td></tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>}
      </main>
    </div>
  );
}

const IconComp = ({ name, ...props }) => {
  const icons = { Calendar, Train, Home, Ticket, Info, MapPin, Clock, Users, Sun, Coffee, Camera, ChevronDown, ChevronUp, Calculator, Wallet, Car, Moon, ArrowRight, Navigation, MapIcon, Route, Plane };
  const LucideIcon = icons[name] || Info;
  return <LucideIcon {...props} />;
};

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
