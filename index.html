const InteractiveTrajectoryMap = () => {
  const [selectedDayIndex, setSelectedDayIndex] = useState(0);
  const currentDayData = itinerary[selectedDayIndex];
  const pathNodes = currentDayData.mapPath || [];

  const generatePathD = () => {
    if (pathNodes.length < 2) return "";
    let d = "";
    pathNodes.forEach((nodeId, index) => {
      const node = mapNodes[nodeId];
      if (index === 0) d += `M ${node.x} ${node.y} `;
      else d += `L ${node.x} ${node.y} `;
    });
    return d;
  };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden flex flex-col md:flex-row">

        <div className="absolute top-4 left-4 bg-white/90 dark:bg-slate-800/90 backdrop-blur px-3 py-2 rounded-lg text-sm font-bold text-gray-700 dark:text-slate-200 shadow-sm z-20 flex flex-col gap-1">
          <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 text-base">
            <Navigation className="w-4 h-4" />
            Day {currentDayData.day} 旅程軌跡
          </div>
          <div className="text-xs text-gray-500 dark:text-slate-400 font-normal">
            住宿地點：{currentDayData.base}
          </div>
        </div>

        {currentDayData.mapInfo && (
          <div className="absolute bottom-4 left-4 sm:left-auto sm:right-4 bg-white/95 dark:bg-slate-800/95 backdrop-blur border border-blue-100 dark:border-slate-700 p-3 rounded-xl shadow-lg z-20 min-w-[160px]">
            <div className="text-[10px] uppercase tracking-wider text-gray-400 dark:text-slate-500 font-bold mb-2">當日移動估計</div>
            <div className="flex flex-col gap-2">
              <div className="flex items-center gap-2">
                <div className="bg-blue-50 dark:bg-blue-900/30 p-1.5 rounded-md"><Route className="w-4 h-4 text-blue-600 dark:text-blue-400" /></div>
                <div>
                  <div className="text-xs text-gray-500 dark:text-slate-400">總里程</div>
                  <div className="text-sm font-bold text-gray-800 dark:text-slate-200">{currentDayData.mapInfo.distance}</div>
                </div>

              <div className="flex items-center gap-2">
                <div className="bg-orange-50 dark:bg-orange-900/30 p-1.5 rounded-md"><Clock className="w-4 h-4 text-orange-600 dark:text-orange-400" /></div>
                <div>
                  <div className="text-xs text-gray-500 dark:text-slate-400">交通耗時</div>
                  <div className="text-sm font-bold text-gray-800 dark:text-slate-200">{currentDayData.mapInfo.duration}</div>
                </div>
              </div>
            </div>
          </div>
        )}

        <div className="relative w-full max-w-[450px] aspect-[4/5] transform scale-110 sm:scale-100">
          
          <svg className="absolute inset-0 w-full h-full drop-shadow-xl" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            <path 
              d="M38,10 L45,10 L52,15 L62,12 L75,18 L82,32 L85,45 L82,55 L75,65 L78,75 L70,88 L60,95 L50,92 L45,80 L35,85 L25,82 L15,75 L20,60 L25,55 L15,45 L18,35 L28,28 L32,18 Z" 
              fill="currentColor" 
              className="text-[#d8e8d2] dark:text-[#2c3e50] transition-colors duration-500"
              stroke="rgba(0,0,0,0.05)" 
              strokeWidth="0.5"
            />
            <path d="M45,28 L75,32 M35,45 L65,48 M40,65 L70,60" stroke="rgba(0,0,0,0.05)" strokeWidth="0.3" strokeDasharray="1,1" fill="none" className="dark:stroke-slate-600"/>
          </svg>

          <svg className="absolute inset-0 w-full h-full overflow-visible z-10" viewBox="0 0 100 100">
            <defs>
              <style>{`
                @keyframes dashMap {
                  from { stroke-dashoffset: 200; }
                  to { stroke-dashoffset: 0; }
                }
                .map-line-anim {
                  stroke-dasharray: 200;
                  animation: dashMap 1.5s ease-out forwards;
                }
              `}</style>
              <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">

                    : 'text-gray-500 dark:text-slate-400 opacity-80'
                }`}>
                  {node.name}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="w-full md:w-2/5 p-4 sm:p-6 bg-white dark:bg-slate-800 flex flex-col max-h-[500px]">
        <h3 className="font-bold text-gray-800 dark:text-slate-100 mb-4 flex items-center gap-2">
          <Calendar className="w-5 h-5 text-blue-500" />

        <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scrollbar">
          {itinerary.map((day, idx) => (
            <button
              key={idx}
              onClick={() => setSelectedDayIndex(idx)}
              className={`w-full text-left p-3 rounded-xl border transition-all ${

            >

                <span className={`font-bold ${selectedDayIndex === idx ? 'text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-slate-300'}`}>
                  Day {day.day}: {day.base}
                </span>
                {day.mapPath.length === 1 && (
                   <span className="text-[10px] bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-slate-400 px-2 py-0.5 rounded-full border border-gray-200 dark:border-slate-600">市區/近郊</span>
                )}
                {day.mapPath.length > 1 && (
                   <span className="text-[10px] bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 px-2 py-0.5 rounded-full font-medium border border-blue-200 dark:border-blue-800">跨區移動</span>
                )}
              </div>
              <p className="text-xs text-gray-500 dark:text-slate-400 line-clamp-1">{day.title}</p>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

          <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div className="mb-6">
              <h2 className="text-2xl font-bold text-gray-800 dark:text-slate-100 flex items-center gap-2"><Clock className="w-6 h-6 text-blue-600 dark:text-blue-400" /> 行程總覽與交通</h2>
              <p className="text-gray-500 dark:text-slate-400 mt-1">點擊每日卡片展開詳細行程，並查看當日細部路線與車程時間。</p>
            </div>
            <div className="space-y-2">
              {itinerary.map(day => <DayCard key={day.day} dayData={day} />)}
            </div>
          </div>
        )}

        {activeTab === 'bases' && (
          <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
            <h2 className="text-2xl font-bold text-gray-800 dark:text-slate-100 flex items-center gap-2 mb-2"><Home className="w-6 h-6 text-blue-600 dark:text-blue-400" /> 住宿策略規劃</h2>
            <p className="text-gray-600 dark:text-slate-300 mb-6">不自駕最高原則：「火車站直結或步行3分鐘內」。新增經濟實惠民宿供參考。</p>
            <div className="space-y-6">
              {bases.map((base, idx) => (
                <div key={base.id} className="bg-white dark:bg-slate-800 rounded-xl shadow-md border-t-4 border-blue-500 dark:border-blue-400 overflow-hidden">
                  <div className="p-5 sm:p-6 bg-gradient-to-br from-white to-blue-50 dark:from-slate-800 dark:to-slate-800/80 border-b border-gray-100 dark:border-slate-700">
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="text-xl font-bold text-blue-800 dark:text-blue-300">據點 {idx + 1}：{base.name}</h3>
                      <span className="bg-blue-100 dark:bg-blue-900/50 text-blue-800 dark:text-blue-200 text-xs font-bold px-3 py-1 rounded-full">{base.nights}</span>
                    </div>
                    <p className="text-gray-600 dark:text-slate-300 text-sm leading-relaxed">{base.description}</p>
                  </div>
                  <div className="p-5 sm:p-6">
                    <h4 className="font-semibold text-gray-700 dark:text-slate-200 mb-4 text-sm uppercase tracking-wider flex items-center gap-2"><Home className="w-4 h-4" /> 推薦飯店 (便利首選)</h4>
                    <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 mb-6">
                      {base.hotels.map((hotel, hIdx) => (
                        <div key={hIdx} className="bg-gray-50 dark:bg-slate-700/50 border border-gray-200 dark:border-slate-600 rounded-lg p-4 hover:shadow-md transition-shadow">
                          <h5 className="font-bold text-gray-800 dark:text-slate-100 mb-2">{hotel.name}</h5><p className="text-sm text-gray-600 dark:text-slate-300">{hotel.desc}</p>
                        </div>
                      ))}
                    </div>
                    <h4 className="font-semibold text-teal-700 dark:text-teal-400 mb-4 text-sm uppercase tracking-wider flex items-center gap-2"><Coffee className="w-4 h-4" /> 經濟實惠民宿 / 公寓 (空間較大)</h4>
                    <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                      {base.guesthouses.map((gh, gIdx) => (
                        <div key={gIdx} className="bg-teal-50/50 dark:bg-teal-900/20 border border-teal-100 dark:border-teal-800/50 rounded-lg p-4 hover:shadow-md transition-shadow">
                          <h5 className="font-bold text-teal-800 dark:text-teal-300 mb-2">{gh.name}</h5><p className="text-sm text-teal-700 dark:text-teal-100/70">{gh.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab === 'tickets' && (
          <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-8">
            <section>
              <h2 className="text-2xl font-bold text-gray-800 dark:text-slate-100 flex items-center gap-2 mb-6"><Ticket className="w-6 h-6 text-blue-600 dark:text-blue-400" /> 建議購買票券清單</h2>
              <div className="grid gap-4 sm:grid-cols-2">
                {ticketsInfo.map((ticket, idx) => (
                  <div key={idx} className="bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-slate-700 flex gap-4 items-start">
                    <div className="p-3 bg-gray-50 dark:bg-slate-700 rounded-lg">{ticket.icon}</div>
                    <div>
                      <h3 className="font-bold text-gray-800 dark:text-slate-100 text-lg mb-1">{ticket.title}</h3><p className="text-gray-600 dark:text-slate-300 text-sm mb-2">{ticket.desc}</p><p className="text-xs text-blue-600 dark:text-blue-400 font-medium bg-blue-50 dark:bg-blue-900/30 inline-block px-2 py-1 rounded">{ticket.users}</p>
                    </div>
                  </div>
                ))}
              </div>
            </section>
            <section className="bg-orange-50 dark:bg-orange-900/10 border border-orange-200 dark:border-orange-800/50 rounded-xl p-6">
              <h2 className="text-xl font-bold text-orange-800 dark:text-orange-400 flex items-center gap-2 mb-4"><Sun className="w-6 h-6" /> 7月夏日攜老扶幼 關鍵注意事項</h2>
              <ul className="space-y-3 text-orange-900 dark:text-orange-200/90 text-sm sm:text-base">
                <li className="flex gap-2"><span className="font-bold">•</span><span><strong>行李黑貓宅急便 (Ta-Q-Bin)：</strong> 在飯店櫃台填寫單據，可將大行李寄到下下間飯店。Day3在福岡寄出，輕裝去別府，行李會在Day6的熊本等您。</span></li>
                <li className="flex gap-2"><span className="font-bold">•</span><span><strong>防暑對策：</strong> 7月九州十分悶熱。務必隨身攜帶水壺、涼感頸圈。每天中午盡量安排在冷氣房內。</span></li>
                <li className="flex gap-2"><span className="font-bold">•</span><span><strong>計程車與行李：</strong> 由於有3大2小共5個行李箱，加上5名乘客，<strong>請直接叫2台計程車</strong>分攤。起步價不高，能有效保存長輩與小孩的體力。</span></li>
              </ul>
            </section>
          </div>
        )}

        {activeTab === 'budget' && (
          <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
            <h2 className="text-2xl font-bold text-gray-800 dark:text-slate-100 flex items-center gap-2 mb-2"><Wallet className="w-6 h-6 text-blue-600 dark:text-blue-400" /> 旅費預算粗估</h2>
            <p className="text-gray-500 dark:text-slate-400 mb-6">為 {totalAdults}大(含長輩) + {totalKids}小 的 10天9夜 預估。(日圓匯率 {budgetData.currencyRate})</p>
            <div className="bg-gradient-to-r from-blue-600 to-blue-800 dark:from-blue-800 dark:to-slate-800 rounded-2xl p-6 text-white mb-8 shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4">
              <div><p className="text-blue-200 font-medium mb-1">{totalAdults + totalKids}人總預算預估 (含機票住宿)</p><div className="text-4xl font-extrabold flex items-baseline gap-2">NT$ {totalTwd.toLocaleString()}<span className="text-lg font-medium text-blue-200 font-normal">TWD</span></div></div>
              <div className="text-right"><p className="text-blue-200 text-sm">約合日圓</p><p className="text-xl font-bold opacity-90">¥ {totalJpy.toLocaleString()}</p></div>
            </div>
            <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-slate-300 text-sm uppercase tracking-wider border-b border-gray-200 dark:border-slate-700">
                      <th className="p-4 font-semibold w-1/3">項目</th><th className="p-4 font-semibold text-right">日圓 (JPY)</th><th className="p-4 font-semibold text-right border-l border-gray-200 dark:border-slate-700">台幣 (TWD)</th><th className="p-4 font-semibold">備註說明</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100 dark:divide-slate-700">
                    {budgetData.items.map((item, idx) => {
                      const itemJpyTotal = item.totalJpy || ((item.jpyPerAdult * totalAdults) + (item.jpyPerKid * totalKids));
                      const itemTwdTotal = Math.round(itemJpyTotal * budgetData.currencyRate);
                      return (
                        <tr key={idx} className="hover:bg-gray-50/50 dark:hover:bg-slate-700/30">
                          <td className="p-4 font-medium text-gray-800 dark:text-slate-200">{item.category}</td>
                          <td className="p-4 font-bold text-gray-700 dark:text-slate-300 text-right whitespace-nowrap">¥ {itemJpyTotal.toLocaleString()}{!item.totalJpy && (<div className="text-xs font-normal text-gray-400 dark:text-slate-500 mt-1">(大:¥{item.jpyPerAdult.toLocaleString()} / 小:¥{item.jpyPerKid.toLocaleString()})</div>)}</td>
                          <td className="p-4 font-bold text-blue-600 dark:text-blue-400 text-right whitespace-nowrap border-l border-gray-100 dark:border-slate-700 bg-blue-50/30 dark:bg-slate-800/50">NT$ {itemTwdTotal.toLocaleString()}</td>
                          <td className="p-4 text-sm text-gray-500 dark:text-slate-400 min-w-[200px]">{item.note}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
